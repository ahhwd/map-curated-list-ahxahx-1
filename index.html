    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #container { display: flex; height: 100vh; }
        #sidebar {
            width: 320px;
            overflow-y: auto;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            flex-shrink: 0;
        }
        #sidebar h2 {

            display: flex;
            align-items: flex-start;

            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.15s;

        .place-item:hover { background: #f5f5f5; }
        .place-number {

            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .place-name { font-weight: 600; font-size: 14px; }
        .place-address { font-size: 12px; color: #666; margin-top: 2px; }
        #map { flex: 1; height: 100%; }
        #search-box {
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            background: #fafafa;
        }
        #search-box textarea {
            width: 100%;
            height: 80px;
            padding: 8px;
            font-size: 13px;
            font-family: inherit;
            border: 1px solid #ccc;
            border-radius: 6px;
            resize: vertical;
        }
        #search-box textarea:focus {
            outline: none;
            border-color: #4285f4;
            box-shadow: 0 0 0 2px rgba(66,133,244,0.2);
        }
        #search-btn {
            width: 100%;
            margin-top: 8px;
            padding: 8px 0;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: #4285f4;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #search-btn:hover { background: #3367d6; }
        #search-btn:disabled { background: #aaa; cursor: not-allowed; }
        #search-status {
            margin-top: 6px;
            font-size: 12px;
            color: #666;
        }
        @media (max-width: 768px) {
            #container { flex-direction: column; }
            #sidebar { width: 100%; height: 200px; order: 2; }
            #map { order: 1; }
        }
    </style>
</head>

        function clearMarkers() {
            gMarkers.forEach(function(m) { m.setMap(null); });
            gMarkers = [];
            gInfoWindows = [];
        }

        function renderPlaces(places) {
            clearMarkers();
            var bounds = new google.maps.LatLngBounds();

            places.forEach(function(p, i) {
                var marker = new google.maps.Marker({
                    position: { lat: p.lat, lng: p.lng },
                    map: gMap,
                    title: p.name,
                    label: { text: String(i + 1), color: "white", fontWeight: "bold" }
                });

                var infoContent = document.createElement('div');
                infoContent.style.fontSize = '14px';
                var strong = document.createElement('strong');
                strong.textContent = (i + 1) + '. ' + p.name;
                infoContent.appendChild(strong);
                infoContent.appendChild(document.createElement('br'));
                infoContent.appendChild(document.createTextNode(p.address));
                infoContent.appendChild(document.createElement('br'));
                var link = document.createElement('a');
                link.href = 'https://www.google.com/maps/place/?q=place_id:' + p.place_id;
                link.target = '_blank';
                link.textContent = '在 Google Maps 開啟';
                infoContent.appendChild(link);

                var infoWindow = new google.maps.InfoWindow({ content: infoContent });

                marker.addListener('click', function() {
                    gInfoWindows.forEach(function(iw) { iw.close(); });
                    infoWindow.open(gMap, marker);
                });

                gMarkers.push(marker);
                gInfoWindows.push(infoWindow);
                bounds.extend(marker.getPosition());
            });

            if (places.length > 0) {
                gMap.fitBounds(bounds, { padding: 50 });
            }

            document.getElementById('sidebar-title').textContent = places.length + ' 個地點';
            var list = document.getElementById('sidebar-list');
            list.innerHTML = '';
            places.forEach(function(p, i) {
                var item = document.createElement('div');
                item.className = 'place-item';
                item.onclick = function() {
                    google.maps.event.trigger(gMarkers[i], 'click');
                    gMap.panTo(gMarkers[i].getPosition());
                };
                var num = document.createElement('span');
                num.className = 'place-number';
                num.textContent = i + 1;
                var info = document.createElement('div');
                var name = document.createElement('div');
                name.className = 'place-name';
                name.textContent = p.name;
                var addr = document.createElement('div');
                addr.className = 'place-address';
                addr.textContent = p.address;
                info.appendChild(name);
                info.appendChild(addr);
                item.appendChild(num);
                item.appendChild(info);
                list.appendChild(item);
            });
        }

        function searchPlaces() {
            var input = document.getElementById('search-input').value.trim();
            if (!input) return;

            var queries = input.split('\n').map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
            if (queries.length === 0) return;

            var btn = document.getElementById('search-btn');
            var status = document.getElementById('search-status');
            btn.disabled = true;
            btn.textContent = '查詢中...';
            status.textContent = '正在查詢 ' + queries.length + ' 個地點...';

            var results = [];
            var completed = 0;
            var total = queries.length;

            queries.forEach(function(query, idx) {
                setTimeout(function() {
                    gService.textSearch({ query: query }, function(res, st) {
                        completed++;
                        if (st === google.maps.places.PlacesServiceStatus.OK && res.length > 0) {
                            var r = res[0];
                            results.push({
                                name: r.name,
                                query: query,
                                address: r.formatted_address || '',
                                lat: r.geometry.location.lat(),
                                lng: r.geometry.location.lng(),
                                place_id: r.place_id,
                                _idx: idx
                            });
                            status.textContent = '已找到 ' + results.length + '/' + total + '...';
                        } else {
                            status.textContent = '找不到: ' + query + ' (' + completed + '/' + total + ')';
                        }

                        if (completed === total) {
                            results.sort(function(a, b) { return a._idx - b._idx; });
                            PLACES = results;
                            renderPlaces(PLACES);
                            btn.disabled = false;
                            btn.textContent = '查詢地點';
                            status.textContent = '完成！找到 ' + results.length + '/' + total + ' 個地點';
                        }
                    });
                }, idx * 300);
            });
        }

        function initMap() {
            gMap = new google.maps.Map(document.getElementById('map'), {
                zoom: 13,
                mapTypeControl: true,
                streetViewControl: false,
            });
            gService = new google.maps.places.PlacesService(gMap);
            renderPlaces(PLACES);
        }
    </script>
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=__GOOGLE_MAPS_API_KEY__&libraries=places&callback=initMap"></script>
</body>
